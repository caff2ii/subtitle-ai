<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT 字幕語意斷句與等比例時間軸拆分工具</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            color: #0f172a;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: var(--primary-hover);
        }
        .btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
        }
        .status-info { background-color: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .status-success { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .status-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
        
        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: var(--border);
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 10px;
            background-color: var(--primary);
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 SRT 字幕語意斷句 & 時間軸等比例拆分</h1>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 25px;">
        上載 SRT 檔案，AI 將自動進行語意斷句並去除行尾標點符號。前端 JS 演算法會根據字數比例精確重新計算時間軸，保證 100% 零字詞增刪。
    </p>

    <div class="form-group">
        <label for="apiKey">Gemini API Key</label>
        <input type="text" id="apiKey" placeholder="貼上你的 Gemini API Key (AI Studio 申請)">
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 5px;">
            您的 API Key 只會儲存在您的瀏覽器中（localStorage），直接向 Google API 發送請求，安全可靠。
        </p>
    </div>

    <div class="form-group">
        <label for="srtFile">選擇 SRT 字幕檔案 (.srt)</label>
        <input type="file" id="srtFile" accept=".srt">
    </div>

    <button id="processBtn" class="btn">開始處理字幕</button>

    <div id="status"></div>
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
</div>

<script>
    // 頁面載入時，自動讀取儲存的 API Key
    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            document.getElementById('apiKey').value = savedKey;
        }
    });

    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    processBtn.addEventListener('click', async () => {
        const apiKey = document.getElementById('apiKey').value.trim();
        const fileInput = document.getElementById('srtFile');
        const file = fileInput.files[0];

        if (!apiKey) {
            showStatus('請先輸入 Gemini API Key！', 'error');
            return;
        }
        if (!file) {
            showStatus('請選擇一個 SRT 檔案！', 'error');
            return;
        }

        // 儲存 API Key 方便下次使用
        localStorage.setItem('gemini_api_key', apiKey);

        try {
            showStatus('正在讀取並解析 SRT 檔案...', 'info');
            const fileText = await file.text();
            
            // 1. 解析 SRT 轉為 JSON Array
            const srtData = parseSRT(fileText);
            if (srtData.length === 0) {
                throw new Error('無法解析該 SRT 檔案，請檢查格式是否正確。');
            }

            // 2. 分批處理 (Chunking) - 每 30 句字幕打包成一組送給 API，避免長度過長
            const chunkSize = 30;
            const chunks = [];
            for (let i = 0; i < srtData.length; i += chunkSize) {
                chunks.push(srtData.slice(i, i + chunkSize));
            }

            showStatus(`檔案解析成功！共 ${srtData.length} 條字幕，分為 ${chunks.length} 個批次處理中...`, 'info');
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';

            let processedSrtData = [];

            for (let i = 0; i < chunks.length; i++) {
                const chunk = chunks[i];
                // 提取純文字並加上自訂 index 標籤，方便回傳後對照
                const promptTexts = chunk.map((item, idx) => `[ID:${idx}] ${item.text}`).join('\n');

                // 呼叫 Gemini 1.5 Flash API
                const processedTexts = await callGeminiAPI(apiKey, promptTexts);

                // 解析 AI 回傳的結果，與原數據合併並進行「等比例時間拆分」
                const parsedChunkResults = parseAIResponse(processedTexts, chunk);
                processedSrtData = processedSrtData.concat(parsedChunkResults);

                // 更新進度條
                const percent = Math.round(((i + 1) / chunks.length) * 100);
                progressBar.style.width = `${percent}%`;
            }

            // 3. 重新編排最終的 SRT 字幕序號，並組裝回 SRT 格式字串
            const finalSRT = generateSRT(processedSrtData);

            // 4. 提供下載
            downloadBlob(finalSRT, file.name.replace('.srt', '_formatted.srt'), 'text/srt');
            showStatus('處理完成！新字幕檔案已自動下載。', 'success');

        } catch (error) {
            console.error(error);
            showStatus(`發生錯誤: ${error.message}`, 'error');
        } finally {
            progressContainer.style.display = 'none';
        }
    });

    function showStatus(msg, type) {
        statusDiv.style.display = 'block';
        statusDiv.textContent = msg;
        statusDiv.className = '';
        if (type === 'info') statusDiv.classList.add('status-info');
        if (type === 'success') statusDiv.classList.add('status-success');
        if (type === 'error') statusDiv.classList.add('status-error');
    }

    // ----------------------------
    // 1. SRT Parser (解析器)
    // ----------------------------
    function parseSRT(data) {
        // 標準化換行符
        const cleanData = data.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        const blocks = cleanData.split('\n\n');
        const items = [];

        blocks.forEach(block => {
            const lines = block.trim().split('\n');
            if (lines.length >= 3) {
                const index = parseInt(lines[0], 10);
                const timecodeLine = lines[1];
                const text = lines.slice(2).join(' '); // 合併多行文字為單行

                const match = timecodeLine.match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
                if (match) {
                    items.push({
                        index,
                        startTime: match[1].replace('.', ','),
                        endTime: match[2].replace('.', ','),
                        text: text.trim()
                    });
                }
            }
        });
        return items;
    }

    // ----------------------------
    // 2. 呼叫 Gemini 1.5 Flash API
    // ----------------------------
    async function callGeminiAPI(apiKey, text) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        
        const systemInstruction = 
            "You are an expert subtitle editor. Your task is to split English sentences into smaller natural clauses/phrases. " +
            "Follow these rules strictly:\n" +
            "1. Output format: Keep the [ID:X] prefix at the start of each segment block. Under each ID, split the text into natural clauses, outputting ONE CLAUSE PER LINE.\n" +
            "2. DO NOT add, delete, or change any words. The vocabulary and word order must be 100% identical to the input.\n" +
            "3. Remove all punctuation marks (periods, commas, question marks, etc.) from the end of each line. Keep internal apostrophes (e.g., don't).\n" +
            "4. Example output format:\n" +
            "[ID:0]\n" +
            "So today we are going to talk about some amazing board games\n" +
            "and then we will review them\n" +
            "[ID:1]\n" +
            "Next line of text";

        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: `Please format the following list of subtitles according to instructions:\n\n${text}`
                    }]
                }],
                systemInstruction: {
                    parts: [{ text: systemInstruction }]
                },
                generationConfig: {
                    temperature: 0.1 // 降低隨機性，保證字詞精確度
                }
            })
        });

        if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error?.message || 'API 呼叫失敗');
        }

        const resData = await response.json();
        return resData.candidates[0].content.parts[0].text;
    }

    // ----------------------------
    // 3. 解析 AI 回傳並「等比例拆分時間軸」
    // ----------------------------
    function parseAIResponse(aiText, originalChunk) {
        const results = [];
        const blocks = aiText.split(/\[ID:\d+\]/);
        // 清理一下，拿掉第一個空元素
        if (blocks[0].trim() === "") blocks.shift();

        originalChunk.forEach((origItem, idx) => {
            const aiBlock = blocks[idx];
            if (!aiBlock) {
                // 如果 AI 漏掉了這句，保留原句
                results.push({ startTime: origItem.startTime, endTime: origItem.endTime, text: origItem.text });
                return;
            }

            // 取得 AI 拆分出來的每一行文字（並過濾掉空行）
            const lines = aiBlock.trim().split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            if (lines.length <= 1) {
                // 如果 AI 沒有拆分，直接保留原時間軸
                results.push({ startTime: origItem.startTime, endTime: origItem.endTime, text: lines[0] || origItem.text });
            } else {
                // **關鍵：等比例時間軸拆分演算法**
                const startMs = timecodeToMs(origItem.startTime);
                const endMs = timecodeToMs(origItem.endTime);
                const totalDuration = endMs - startMs;

                // 算每行單字數 (Word Count) 作為權重，如果是中文可以用 length，英文用字數
                const lineWeights = lines.map(line => line.split(/\s+/).filter(w => w.length > 0).length || 1);
                const totalWeight = lineWeights.reduce((a, b) => a + b, 0);

                let currentStartMs = startMs;
                for (let i = 0; i < lines.length; i++) {
                    const lineDuration = Math.round(totalDuration * (lineWeights[i] / totalWeight));
                    let currentEndMs = currentStartMs + lineDuration;
                    
                    // 最後一行強制精確對齊結束時間
                    if (i === lines.length - 1) {
                        currentEndMs = endMs;
                    }

                    results.push({
                        startTime: msToTimecode(currentStartMs),
                        endTime: msToTimecode(currentEndMs),
                        text: lines[i]
                    });

                    currentStartMs = currentEndMs;
                }
            }
        });

        return results;
    }

    // ----------------------------
    // 4. 重建 SRT 並排序
    // ----------------------------
    function generateSRT(items) {
        return items.map((item, index) => {
            return `${index + 1}\n${item.startTime} --> ${item.endTime}\n${item.text}\n`;
        }).join('\n');
    }

    // ----------------------------
    // ⚙️ 時間轉換輔助函數
    // ----------------------------
    function timecodeToMs(tc) {
        const parts = tc.replace(',', '.').split(':');
        const hrs = parseInt(parts[0], 10);
        const mins = parseInt(parts[1], 10);
        const secsParts = parts[2].split('.');
        const secs = parseInt(secsParts[0], 10);
        const ms = parseInt(secsParts[1], 10);
        return (hrs * 3600 + mins * 60 + secs) * 1000 + ms;
    }

    function msToTimecode(ms) {
        const hrs = Math.floor(ms / 3600000);
        const mins = Math.floor((ms % 3600000) / 60000);
        const secs = Math.floor((ms % 60000) / 1000);
        const msecs = ms % 1000;

        const pad = (n, z = 2) => ('00' + n).slice(-z);
        const padMs = (n) => ('000' + n).slice(-3);

        return `${pad(hrs)}:${pad(mins)}:${pad(secs)},${padMs(msecs)}`;
    }

    // ----------------------------
    // 💾 下載輔助函數
    // ----------------------------
    function downloadBlob(content, filename, contentType) {
        const blob = new Blob([content], { type: contentType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
