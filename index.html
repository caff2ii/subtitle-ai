<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT 字幕語意斷句與等比例時間軸拆分工具</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 20px;
            /* 喺你原本 body 嘅括號入面，求其一格加上呢行，等切換深色時隻眼舒服啲 */
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            color: #0f172a;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: var(--primary-hover);
        }
        .btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
            white-space: pre-line;
        }
        .status-info { background-color: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .status-success { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .status-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
        
        .progress-container {
            width: 100%;
            background-color: var(--border);
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 10px;
            background-color: var(--primary);
            transition: width 0.3s;
        }
        /* 🌙 自動系統暗黑模式 (Dark Mode) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;       /* 深藍黑底色 */
                --card-bg: #1e293b;  /* 卡片深灰色 */
                --text: #f1f5f9;     /* 亮白文字 */
                --border: #334155;   /* 深色邊框 */
            }
            h1 {
                color: #f8fafc;
            }
            p {
                color: #94a3b8 !important;
            }
            label {
                color: #cbd5e1;
            }
            input[type="text"] {
                background-color: #0f172a;
                color: #f1f5f9;
                border-color: #334155;
            }
            input[type="text"]::placeholder {
                color: #64748b;
            }
            input[type="file"] {
                background-color: #0f172a;
                color: #94a3b8;
                border-color: #334155;
            }
            
            /* Status 狀態欄暗黑配色 */
            .status-info { 
                background-color: #1e293b; 
                color: #60a5fa; 
                border-color: #2563eb; 
            }
            .status-success { 
                background-color: #064e3b; 
                color: #34d399; 
                border-color: #059669; 
            }
            .status-error { 
                background-color: #7f1d1d; 
                color: #fca5a5; 
                border-color: #b91c1c; 
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 SRT 字幕語意斷句 & 時間軸等比例拆分 v1.3</h1>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 25px;">
        上載 SRT 檔案，AI 將自動進行語意斷句並去除行尾標點符號。前端 JS 演算法會根據字數比例精確重新計算時間軸，保證 100% 零字詞增刪（支援中英雙語）。
    </p>

    <div class="form-group">
        <label for="apiKey">Gemini API Key</label>
        <input type="text" id="apiKey" placeholder="貼上你的 Gemini API Key (AI Studio 申請)">
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 5px;">
            您的 API Key 只會儲存在您的瀏覽器中（localStorage），直接向 Google API 發送請求，安全可靠。
        </p>
    </div>

    <div class="form-group">
        <label for="srtFile">選擇 SRT 字幕檔案 (.srt)</label>
        <input type="file" id="srtFile" accept=".srt">
    </div>

    <button id="processBtn" class="btn">開始處理字幕</button>

    <div id="status"></div>
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
</div>

<script>
    // 頁面載入時，自動讀取儲存的 API Key
    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            document.getElementById('apiKey').value = savedKey;
        }
    });

    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    let currentChunkIndex = 0;
    let processedSrtData = [];
    let chunks = [];
    let currentFile = null;
    
    processBtn.addEventListener('click', async () => {
        const apiKey = document.getElementById('apiKey').value.trim();
        const fileInput = document.getElementById('srtFile');
        const file = fileInput.files[0];

        // 如果改選了別個新檔案，重設按鈕文字
        if (file && file !== currentFile) {
            processBtn.textContent = '開始處理字幕';
        }
        
        if (!apiKey) {
            showStatus('請先輸入 Gemini API Key！', 'error');
            return;
        }
    
        // 如果是用戶新選檔案，或者第一次按，就初始化
        if (file && file !== currentFile) {
            currentFile = file;
            currentChunkIndex = 0;
            processedSrtData = [];
            
            showStatus('正在讀取並解析 SRT 檔案...', 'info');
            const fileText = await file.text();
            const srtData = parseSRT(fileText);
            if (srtData.length === 0) {
                showStatus('無法解析該 SRT 檔案，請確認檔案格式是否正確。', 'error');
                return;
            }
    
            const chunkSize = 15; // 順便降低每批數量減少429機率
            chunks = [];
            for (let i = 0; i < srtData.length; i += chunkSize) {
                chunks.push(srtData.slice(i, i + chunkSize));
            }
        } else if (!currentFile) {
            showStatus('請選擇一個 SRT 檔案！', 'error');
            return;
        }
    
        // 儲存 API Key
        localStorage.setItem('gemini_api_key', apiKey);
        processBtn.disabled = true;
    
        try {
            progressContainer.style.display = 'block';
    
            // 由上次斷開的 currentChunkIndex 開始繼續
            for (let i = currentChunkIndex; i < chunks.length; i++) {
                currentChunkIndex = i; // 隨時記錄當前進度
                const chunk = chunks[i];
                const promptTexts = chunk.map((item, idx) => `[ID:${idx}] ${item.text}`).join('\n');
    
                showStatus(`正在處理第 ${i + 1} / ${chunks.length} 批字幕...${i > 0 ? '（續傳中）' : ''}`, 'info');
    
                const processedTexts = await callGeminiAPI(apiKey, promptTexts);
                const parsedChunkResults = parseAIResponse(processedTexts, chunk);
                processedSrtData = processedSrtData.concat(parsedChunkResults);
    
                const percent = Math.round(((i + 1) / chunks.length) * 100);
                progressBar.style.width = `${percent}%`;
    
                // 智能節流：每批次之間強制強制休息 2.5 秒，避免連續請求被封
                if (i < chunks.length - 1) {
                    await new Promise(resolve => setTimeout(resolve, 2500));
                }
            }
    
            // 全部完成後才重設狀態並下載
            const finalSRT = generateSRT(processedSrtData);
            downloadBlob(finalSRT, currentFile.name.replace('.srt', '_formatted.srt'), 'text/srt');
            showStatus('🎉 全部處理完成！新字幕檔案已成功自動下載。', 'success');
            
            // 成功後清除暫存，以便下次放入新檔
            currentFile = null;
            currentChunkIndex = 0;
            processedSrtData = [];
    
        } catch (error) {
            console.error(error);
            processBtn.textContent = '重新嘗試 (繼續未完成部分)';
            showStatus(`❌ 處理在第 ${currentChunkIndex + 1} / ${chunks.length} 批發生錯誤: ${error.message}\n\n💡 檢查網絡或 Key 後，您可以直接再點擊上方按鈕「繼續處理」剩餘段落。`, 'error');
        } finally {
            processBtn.disabled = false;
        }
    });

    function showStatus(msg, type) {
        statusDiv.style.display = 'block';
        statusDiv.textContent = msg;
        statusDiv.className = '';
        if (type === 'info') statusDiv.classList.add('status-info');
        if (type === 'success') statusDiv.classList.add('status-success');
        if (type === 'error') statusDiv.classList.add('status-error');
    }

    // ----------------------------
    // 1. SRT Parser (正則優化版)
    // ----------------------------
    function parseSRT(data) {
        const cleanData = data.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        // 使用正則拆分空行，相容多個連續空行
        const blocks = cleanData.split(/\n\s*\n/);
        const items = [];

        blocks.forEach(block => {
            const lines = block.trim().split('\n').map(l => l.trim());
            if (lines.length >= 3) {
                const index = parseInt(lines[0], 10);
                const timecodeLine = lines[1];
                const text = lines.slice(2).join(' '); // 合併多行字幕

                // 相容 1 位數到 2 位數的小時表示
                const match = timecodeLine.match(/(\d{1,2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{1,2}:\d{2}:\d{2}[,.]\d{3})/);
                if (match) {
                    items.push({
                        index,
                        startTime: match[1].replace('.', ','),
                        endTime: match[2].replace('.', ','),
                        text: text.trim()
                    });
                }
            }
        });
        return items;
    }

    // ----------------------------
    // 2. 呼叫 Gemini 3.5 Flash API (Exponential Backoff 重試版)
    // ----------------------------
    async function callGeminiAPI(apiKey, text, retries = 5, delayMs = 4000) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;
        
        const systemInstruction = 
            "You are an expert subtitle editor. Your task is to split English or Chinese sentences into smaller natural clauses/phrases. " +
            "Follow these rules strictly:\n" +
            "1. Output format: Keep the [ID:X] prefix at the start of each segment block. Under each ID, split the text into natural clauses, outputting ONE CLAUSE PER LINE.\n" +
            "2. DO NOT add, delete, or change any words. The vocabulary and character order must be 100% identical to the input.\n" +
            "3. Remove all punctuation marks (periods, commas, question marks, etc.) from the end of each line. Keep internal apostrophes (e.g., don't).\n" +
            "4. Example output format:\n" +
            "[ID:0]\n" +
            "So today we are going to talk about some amazing board games\n" +
            "and then we will review them\n" +
            "[ID:1]\n" +
            "Next line of text";

        for (let attempt = 0; attempt < retries; attempt++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Please format the following list of subtitles according to instructions:\n\n${text}`
                            }]
                        }],
                        systemInstruction: {
                            parts: [{ text: systemInstruction }]
                        },
                        generationConfig: {
                            temperature: 0.1 // 最低隨機性，防止幻覺
                        }
                    })
                });

                // 遇到 429 頻率超限錯誤，啟動延遲重試
                if (response.status === 429) {
                    if (attempt < retries - 1) {
                        console.warn(`Rate limit hit (429). Retrying in ${delayMs}ms...`);
                        await new Promise(resolve => setTimeout(resolve, delayMs));
                        delayMs *= 2; // 指數退避
                        continue;
                    }
                }

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `API Error (Status: ${response.status})`);
                }

                const resData = await response.json();
                return resData.candidates[0].content.parts[0].text;

            } catch (error) {
                if (attempt === retries - 1) throw error;
                console.warn(`Attempt ${attempt + 1} failed: ${error.message}. Retrying in ${delayMs}ms...`);
                await new Promise(resolve => setTimeout(resolve, delayMs));
                delayMs *= 2;
            }
        }
    }

    // ----------------------------
    // 3. 解析 AI 回傳並進行「中英等比例時間軸拆分」
    // ----------------------------
    function parseAIResponse(aiText, originalChunk) {
        const results = [];
        
        // 清理 AI 有可能產生的 Markdown Code Block ``` 包裹
        let cleanText = aiText.replace(/```[a-zA-Z]*\n/g, '').replace(/```/g, '');

        // 精確的正則表達式 Map 配對法，防範 AI 順序錯亂
        const aiMap = new Map();
        const regex = /\[ID:(\d+)\]\s*([\s\S]*?)(?=\[ID:\d+\]|$)/g;
        let match;
        while ((match = regex.exec(cleanText)) !== null) {
            const id = parseInt(match[1], 10);
            const content = match[2].trim();
            aiMap.set(id, content);
        }

        originalChunk.forEach((origItem, idx) => {
            const aiBlock = aiMap.get(idx);
            if (aiBlock === undefined) {
                // 如果 AI 漏掉了這句，安全回退保留原字句與時間軸
                results.push({ startTime: origItem.startTime, endTime: origItem.endTime, text: origItem.text });
                return;
            }

            const lines = aiBlock.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            if (lines.length <= 1) {
                results.push({ startTime: origItem.startTime, endTime: origItem.endTime, text: lines[0] || origItem.text });
            } else {
                const startMs = timecodeToMs(origItem.startTime);
                const endMs = timecodeToMs(origItem.endTime);
                const totalDuration = endMs - startMs;

                // 智能計算權重（相容中文與英文）
                const lineWeights = lines.map(line => getLineWeight(line));
                const totalWeight = lineWeights.reduce((a, b) => a + b, 0) || 1;

                let accumulatedDuration = 0;
                for (let i = 0; i < lines.length; i++) {
                    const currentStartMs = startMs + accumulatedDuration;
                    const lineDuration = Math.round(totalDuration * (lineWeights[i] / totalWeight));
                    let currentEndMs = currentStartMs + lineDuration;
                    
                    if (i === lines.length - 1) {
                        currentEndMs = endMs;
                    }
                
                    results.push({
                        startTime: msToTimecode(currentStartMs),
                        endTime: msToTimecode(currentEndMs),
                        text: lines[i]
                    });
                
                    accumulatedDuration += (currentEndMs - currentStartMs);
                }
            }
        });

        return results;
    }

    // 智能雙語權重計算函數
    function getLineWeight(line) {
        const clean = line.replace(/\s+/g, '');
        // 判斷是否包含中日韓（CJK）字元
        const hasCJK = /[\u4e00-\u9fa5\u3040-\u30ff\uac00-\ud7af]/.test(line);
        if (hasCJK) {
            // 如果是中文，按「字元長度」計算權重
            return clean.length || 1;
        } else {
            // 如果是英文，按「單字數」計算權重
            return line.split(/\s+/).filter(w => w.length > 0).length || 1;
        }
    }

    // ----------------------------
    // 4. 重建 SRT 並重新排序序號
    // ----------------------------
    function generateSRT(items) {
        return items.map((item, index) => {
            return `${index + 1}\n${item.startTime} --> ${item.endTime}\n${item.text}\n`;
        }).join('\n');
    }

    // ----------------------------
    // ⚙️ 時間轉換輔助函數 (padStart 修正版)
    // ----------------------------
    function timecodeToMs(tc) {
        const parts = tc.replace(',', '.').split(':');
        const hrs = parseInt(parts[0], 10);
        const mins = parseInt(parts[1], 10);
        const secsParts = parts[2].split('.');
        const secs = parseInt(secsParts[0], 10);
        const ms = parseInt(secsParts[1], 10);
        return (hrs * 3600 + mins * 60 + secs) * 1000 + ms;
    }

    function msToTimecode(ms) {
        const roundedMs = Math.round(ms);
        const hrs = Math.floor(roundedMs / 3600000);
        const mins = Math.floor((roundedMs % 3600000) / 60000);
        const secs = Math.floor((roundedMs % 60000) / 1000);
        const msecs = roundedMs % 1000;

        const pad = (n, z = 2) => String(n).padStart(z, '0');

        return `${pad(hrs)}:${pad(mins)}:${pad(secs)},${pad(msecs, 3)}`;
    }

    // ----------------------------
    // 💾 下載輔助函數
    // ----------------------------
    function downloadBlob(content, filename, contentType) {
        const blob = new Blob([content], { type: contentType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
